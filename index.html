  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    body { cursor: none; }

    .scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .layer-bg {
      background-image: url('images/bg.png');
      z-index: 1;
    }

    .layer-main {
      background-image: url('images/main.png');
      z-index: 2;
    }

    .reveal {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background-image: url('images/bg.png');
      background-size: cover;
      background-position: -45px center;
      mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
    }

    canvas#particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .welcome {
      position: fixed;
      bottom: 95px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 2.5vw;
      font-weight: 900;
      text-transform: uppercase;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 4px;
      text-align: center;
      white-space: nowrap;
      font-family: 'Arial Black', Impact, sans-serif;
    }

    .welcome .letter {
      display: inline-block;
      color: rgba(230, 230, 230, 0.9);
      opacity: 0;
      transform: translateY(30px) scale(0.8) rotateX(-45deg);
      transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      white-space: pre;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0), 0 0 20px rgba(0, 255, 255, 0);
    }

    .welcome .letter.visible {
      opacity: 1;
      transform: translateY(0) scale(1) rotateX(0);
      animation: softGlow 3s infinite alternate ease-in-out;
    }

    @keyframes softGlow {
      0% { text-shadow: 0 0 10px rgba(74, 144, 226, 0.3), 0 0 20px rgba(74, 144, 226, 0.1); }
      100% { text-shadow: 0 0 20px rgba(74, 144, 226, 0.6), 0 0 40px rgba(74, 144, 226, 0.3); }
    }

    @media (max-width: 768px) {
      .welcome { font-size: 8vw; }
    }

    .socials {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      z-index: 10;
    }

    .socials a {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      cursor: none;
    }

    .socials a:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.15);
    }

    .socials a svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .scroll-hint {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }

    .scroll-hint svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: rgba(255,255,255,0.5);
      stroke-width: 2;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @media (max-width: 768px) {
      .cursor-dot { display: none; }
      body { cursor: auto; }
      .socials a { cursor: pointer; }
      .scroll-hint { display: flex; }
    }

    @media (min-width: 769px) {
      .scroll-hint { display: none; }
    }
  </style>
</head>

  <script>
    const reveal = document.getElementById('reveal');
    const dot = document.getElementById('dot');
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    let mx = window.innerWidth / 2;
    let my = window.innerHeight / 2;
    let cx = mx, cy = my;
    let targetR = 0;
    let currentR = 0;
    let active = false;
    let lastTouchTime = 0;

    const CIRCLE_SIZE = 200;
    const CIRCLE_SIZE_MOBILE = 140;

    if (isMobile) {
      document.addEventListener('touchstart', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
        targetR = CIRCLE_SIZE_MOBILE;
      }, { passive: true });

      document.addEventListener('touchmove', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
      }, { passive: true });

      document.addEventListener('touchend', () => {
        setTimeout(() => {
          if (Date.now() - lastTouchTime > 600) {
            targetR = 0;
            active = false;
          }
        }, 600);
      });
    } else {
      targetR = CIRCLE_SIZE;
      active = true;

      document.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
      });
    }

    function loop() {
      cx += (mx - cx) * 0.25;
      cy += (my - cy) * 0.25;
      currentR += (targetR - currentR) * 0.1;

      if (currentR > 0.5) {
        reveal.style.maskImage =
          `radial-gradient(circle ${currentR}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
        reveal.style.webkitMaskImage =
          `radial-gradient(circle ${currentR}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
      } else {
        reveal.style.maskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
        reveal.style.webkitMaskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
      }

      requestAnimationFrame(loop);
    }

    loop();

    // Welcome text animation
    const welcomeText = 'welcome to xoleric portfolio';
    const welcomeEl = document.getElementById('welcome');
    welcomeText.split('').forEach((char, index) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.classList.add('letter');
      span.style.animationDelay = `${index * 0.1}s`;
      welcomeEl.appendChild(span);
      setTimeout(() => {
        span.classList.add('visible');
      }, index * 120);
    });

    // Neurons
    const pc = document.getElementById('particles');
    const pctx = pc.getContext('2d');
    let PW, PH;
    function pResize() {
      PW = pc.width = window.innerWidth;
      PH = pc.height = window.innerHeight;
    }
    pResize();
    window.addEventListener('resize', pResize);

    const NEURON_COUNT = 40;
    const CONNECT_DIST = 200;
    const CURSOR_REPEL = 250;
    const REVEAL_REPEL = 220;
    const neurons = [];

    function createNeuron() {
      let x, y;
      do {
        x = Math.random() * PW;
        y = Math.random() * PH;
      } while (Math.sqrt((x - mx) ** 2 + (y - my) ** 2) < CURSOR_REPEL);
      return {
        x,
        y,
        vx: (Math.random() - 0.5) * 0.05,
        vy: (Math.random() - 0.5) * 0.05,
        size: Math.random() * 4 + 3,
        opacity: Math.random() * 0.6 + 0.3,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.008 + 0.002,
        drift: Math.random() * Math.PI * 2,
        driftSpeed: Math.random() * 0.001 + 0.0003,
        driftRadius: Math.random() * 0.03 + 0.01
      };
    }

    for (let i = 0; i < NEURON_COUNT; i++) {
      neurons.push(createNeuron());
    }

    function drawNeurons() {
      pctx.clearRect(0, 0, PW, PH);

      for (let i = 0; i < neurons.length; i++) {
        const n = neurons[i];

        const dx = mx - n.x;
        const dy = my - n.y;
        const distToCursor = Math.sqrt(dx * dx + dy * dy);
        if (distToCursor < CURSOR_REPEL && distToCursor > 0) {
          const force = (1 - distToCursor / CURSOR_REPEL) * 0.8;
          n.vx -= (dx / distToCursor) * force;
          n.vy -= (dy / distToCursor) * force;
        }

        const rcx = cx;
        const rcy = cy;
        const dxr = rcx - n.x;
        const dyr = rcy - n.y;
        const distToReveal = Math.sqrt(dxr * dxr + dyr * dyr);
        if (distToReveal < REVEAL_REPEL && distToReveal > 0) {
          const force = (1 - distToReveal / REVEAL_REPEL) * 0.5;
          n.vx -= (dxr / distToReveal) * force;
          n.vy -= (dyr / distToReveal) * force;
        }

        n.vx *= 0.98;
        n.vy *= 0.98;

        n.drift += n.driftSpeed;
        n.vx += Math.sin(n.drift) * n.driftRadius;
        n.vy += Math.cos(n.drift * 0.7) * n.driftRadius;

        n.x += n.vx;
        n.y += n.vy;
        n.pulse += n.pulseSpeed;

        if (n.x < -30) n.x = PW + 30;
        if (n.x > PW + 30) n.x = -30;
        if (n.y < -30) n.y = PH + 30;
        if (n.y > PH + 30) n.y = -30;
      }

      for (let i = 0; i < neurons.length; i++) {
        for (let j = i + 1; j < neurons.length; j++) {
          const a = neurons[i];
          const b = neurons[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CONNECT_DIST) {
            const t = (1 - dist / CONNECT_DIST);
            const lineAlpha = t * 0.5;
            pctx.beginPath();
            pctx.moveTo(a.x, a.y);
            pctx.lineTo(b.x, b.y);
            pctx.strokeStyle = `rgba(210, 170, 0, ${lineAlpha})`;
            pctx.lineWidth = t * 1.5;
            pctx.stroke();
          }
        }
      }

      for (let i = 0; i < neurons.length; i++) {
        const n = neurons[i];
        const pulseFactor = 0.6 + Math.sin(n.pulse) * 0.4;
        const alpha = n.opacity * pulseFactor;

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size * 2, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.1})`;
        pctx.fill();

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
        pctx.fill();

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size * 0.5, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(20, 18, 0, ${alpha * 0.8})`;
        pctx.fill();
      }

      requestAnimationFrame(drawNeurons);
    }

    drawNeurons();
  </script>
