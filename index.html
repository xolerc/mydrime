<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta property="og:site_name" content="xoleric" />
  <meta property="og:title" content="xoleric - Frontend Developer" />
  <meta property="og:description" content="Assalomu alaykum! Men zamonaviy va innovatsion veb-ilovalarni yaratishga ixtisoslashgan Frontend dasturchiman. Sun'iy intellekt, 3D veb texnologiyalar va yuqori sifatli foydalanuvchi interfeyslarini ishlab chiqish." />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: none;
      background: #000;
    }

    .layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
    }

    .layer-bg {
      background-image: url('images/main.png');
      z-index: 1;
    }

    .layer-main {
      background-image: url('images/bg.png');
      z-index: 2;
    }

    .reveal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background-image: url('images/main.png');
      background-size: cover;
      background-position: center;
    }

    .cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="layer layer-bg"></div>
  <div class="layer layer-main"></div>
  <canvas id="canvas"></canvas>
  <div class="cursor-dot" id="dot"></div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dot = document.getElementById('dot');
    const bgImg = new Image();
    bgImg.src = 'images/main.png';

    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let mx = W / 2, my = H / 2;
    let cx = mx, cy = my;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
    });

    const CIRCLE_RADIUS = 160;
    const POINTS = 80;
    const time = { value: 0 };

    function drawReveal() {
      cx += (mx - cx) * 0.08;
      cy += (my - cy) * 0.08;
      time.value += 0.04;

      ctx.clearRect(0, 0, W, H);

      ctx.save();
      ctx.beginPath();

      for (let i = 0; i <= POINTS; i++) {
        const angle = (i / POINTS) * Math.PI * 2;

        const wave1 = Math.sin(angle * 3 + time.value * 2.5) * 12;
        const wave2 = Math.sin(angle * 5 - time.value * 1.8) * 8;
        const wave3 = Math.cos(angle * 2 + time.value * 3.2) * 6;
        const jitter = Math.sin(time.value * 8 + i * 0.5) * 3;

        const r = CIRCLE_RADIUS + wave1 + wave2 + wave3 + jitter;

        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          const prevAngle = ((i - 1) / POINTS) * Math.PI * 2;
          const prevWave1 = Math.sin(prevAngle * 3 + time.value * 2.5) * 12;
          const prevWave2 = Math.sin(prevAngle * 5 - time.value * 1.8) * 8;
          const prevWave3 = Math.cos(prevAngle * 2 + time.value * 3.2) * 6;
          const prevJitter = Math.sin(time.value * 8 + (i - 1) * 0.5) * 3;
          const prevR = CIRCLE_RADIUS + prevWave1 + prevWave2 + prevWave3 + prevJitter;
          const prevX = cx + Math.cos(prevAngle) * prevR;
          const prevY = cy + Math.sin(prevAngle) * prevR;

          const cpX = (prevX + x) / 2;
          const cpY = (prevY + y) / 2;
          ctx.quadraticCurveTo(prevX, prevY, cpX, cpY);
        }
      }

      ctx.closePath();
      ctx.clip();

      const scale = Math.max(W, H) / 400;
      const imgW = bgImg.naturalWidth || W;
      const imgH = bgImg.naturalHeight || H;
      const aspectRatio = imgW / imgH;
      let drawW, drawH;

      if (W / H > aspectRatio) {
        drawW = W;
        drawH = W / aspectRatio;
      } else {
        drawH = H;
        drawW = H * aspectRatio;
      }

      ctx.drawImage(bgImg, 0, 0, drawW, drawH);
      ctx.restore();

      requestAnimationFrame(drawReveal);
    }

    bgImg.onload = () => drawReveal();
  </script>
</body>
</html>
