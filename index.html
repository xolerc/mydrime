<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xoleric</title>
  <meta name="description" content="Assalomu alaykum! Men zamonaviy va innovatsion veb-ilovalarni yaratishga ixtisoslashgan Frontend dasturchiman. Asosiy yo'nalishlarim sun'iy intellekt, 3D veb texnologiyalar va yuqori sifatli foydalanuvchi interfeyslarini ishlab chiqishdan iborat." />
  <meta property="og:site_name" content="xoleric" />
  <meta property="og:title" content="xoleric - Frontend Developer" />
  <meta property="og:description" content="Assalomu alaykum! Men zamonaviy va innovatsion veb-ilovalarni yaratishga ixtisoslashgan Frontend dasturchiman. Sun'iy intellekt, 3D veb texnologiyalar va yuqori sifatli foydalanuvchi interfeyslarini ishlab chiqish." />
  <meta property="og:image" content="https://i.ibb.co/1YkVGcLr/file-000000006dac7246bdc26b703d4174a7.png" />
  <meta property="og:url" content="https://xolerc.github.io/mydrime/" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: none;
      background: #000;
    }

    .layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .layer-bg {
      background-image: url('images/bg.png');
      z-index: 1;
    }

    .layer-main {
      background-image: url('images/main.png');
      z-index: 2;
    }

    .reveal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background-image: url('images/bg.png');
      background-size: cover;
      background-position: -90px center;
      mask-image: radial-gradient(circle 100px at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle 100px at 50% 50%, black 0%, transparent 100%);
    }

    .cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="layer layer-bg"></div>
  <div class="layer layer-main"></div>
  <div class="reveal" id="reveal"></div>
  <div class="cursor-dot" id="dot"></div>

  <script>
    const reveal = document.getElementById('reveal');
    const dot = document.getElementById('dot');
    let mx = window.innerWidth / 2;
    let my = window.innerHeight / 2;
    let cx = mx, cy = my;

    const CIRCLE_SIZE = 200;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
    });

    function loop() {
      cx += (mx - cx) * 0.12;
      cy += (my - cy) * 0.12;

      reveal.style.maskImage =
        `radial-gradient(circle ${CIRCLE_SIZE}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
      reveal.style.webkitMaskImage =
        `radial-gradient(circle ${CIRCLE_SIZE}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
