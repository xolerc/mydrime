  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    body { cursor: none; }

    .scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .layer-bg {
      background-image: url('images/bg.png');
      z-index: 1;
    }

    .layer-main {
      background-image: url('images/main.png');
      z-index: 2;
    }

    .reveal {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background-image: url('images/bg.png');
      background-size: cover;
      background-position: -45px center;
      mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
    }

    canvas#particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .socials {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      z-index: 10;
    }

    .socials a {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      cursor: none;
    }

    .socials a:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.15);
    }

    .socials a svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .scroll-hint {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }

    .scroll-hint svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: rgba(255,255,255,0.5);
      stroke-width: 2;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @media (max-width: 768px) {
      .cursor-dot { display: none; }
      body { cursor: auto; }
      .socials a { cursor: pointer; }
      .scroll-hint { display: flex; }
    }

    @media (min-width: 769px) {
      .scroll-hint { display: none; }
    }
  </style>
</head>
<body>

    <div class="layer layer-main"></div>
    <div class="reveal" id="reveal"></div>
  </div>

  <div class="cursor-dot" id="dot"></div>

  <script>
    const reveal = document.getElementById('reveal');
    const dot = document.getElementById('dot');
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    let mx = window.innerWidth / 2;
    let my = window.innerHeight / 2;
    let cx = mx, cy = my;
    let targetR = 0;
    let currentR = 0;
    let active = false;
    let lastTouchTime = 0;

    const CIRCLE_SIZE = 200;
    const CIRCLE_SIZE_MOBILE = 140;

    if (isMobile) {
      document.addEventListener('touchstart', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
        targetR = CIRCLE_SIZE_MOBILE;
      }, { passive: true });

      document.addEventListener('touchmove', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
      }, { passive: true });

      document.addEventListener('touchend', () => {
        setTimeout(() => {
          if (Date.now() - lastTouchTime > 600) {
            targetR = 0;
            active = false;
          }
        }, 600);
      });
    } else {
      targetR = CIRCLE_SIZE;
      active = true;

      document.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
      });
    }

    function loop() {
      cx += (mx - cx) * 0.12;
      cy += (my - cy) * 0.12;
      currentR += (targetR - currentR) * 0.1;

      if (currentR > 0.5) {
        reveal.style.maskImage =
          `radial-gradient(circle ${currentR}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
        reveal.style.webkitMaskImage =
          `radial-gradient(circle ${currentR}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
      } else {
        reveal.style.maskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
        reveal.style.webkitMaskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
      }

      requestAnimationFrame(loop);
    }

    loop();

    // Particles
    const pc = document.getElementById('particles');
    const pctx = pc.getContext('2d');
    let PW, PH;
    function pResize() {
      PW = pc.width = window.innerWidth;
      PH = pc.height = window.innerHeight;
    }
    pResize();
    window.addEventListener('resize', pResize);

    const PARTICLE_COUNT = 60;
    const particles = [];

    function createParticle() {
      const angle = Math.random() * Math.PI * 2;
      const dist = 0.3 + Math.random() * 0.7;
      const side = Math.random() > 0.5 ? 1 : -1;
      return {
        x: PW / 2 + Math.cos(angle) * PW * 0.35 * side * dist,
        y: PH / 2 + Math.sin(angle) * PH * 0.35 * dist,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2 + 0.5,
        opacity: Math.random() * 0.5 + 0.1,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.02 + 0.005,
        life: 1,
        fadeSpeed: Math.random() * 0.001 + 0.0003
      };
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(createParticle());
    }

    function drawParticles() {
      pctx.clearRect(0, 0, PW, PH);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.pulse += p.pulseSpeed;
        p.life -= p.fadeSpeed;

        const pulseFactor = 0.5 + Math.sin(p.pulse) * 0.5;
        const alpha = p.opacity * pulseFactor * p.life;

        if (p.life <= 0 || p.x < -50 || p.x > PW + 50 || p.y < -50 || p.y > PH + 50) {
          particles[i] = createParticle();
          continue;
        }

        pctx.beginPath();
        pctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        pctx.fill();

        pctx.beginPath();
        pctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.15})`;
        pctx.fill();
      }

      requestAnimationFrame(drawParticles);
    }

    drawParticles();
  </script>
