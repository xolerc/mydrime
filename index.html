  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background: #000;
      font-family: sans-serif;
    }

    /* ─── HERO SCENE ─── */
    .hero-scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .layer-bg {
      background-image: url('images/bg.png');
      z-index: 1;
    }

    .layer-main {
      background-image: url('images/main.png');
      z-index: 2;
    }

    .reveal {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background-image: url('images/bg.png');
      background-size: cover;
      background-position: -45px center;
      mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
    }

    canvas#particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .welcome {
      position: absolute;
      bottom: 95px;
      left: 40%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 2.5vw;
      font-weight: 900;
      text-transform: uppercase;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 4px;
      text-align: center;
      white-space: nowrap;
      font-family: 'Arial Black', Impact, sans-serif;
    }

    .welcome .letter {
      display: inline-block;
      color: rgba(230, 230, 230, 0.9);
      opacity: 0;
      transform: translateY(30px) scale(0.8) rotateX(-45deg);
      transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      white-space: pre;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0), 0 0 20px rgba(0, 255, 255, 0);
    }

    .welcome .letter.visible {
      opacity: 1;
      transform: translateY(0) scale(1) rotateX(0);
      animation: softGlow 3s infinite alternate ease-in-out;
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1),
                  text-shadow 0.4s ease,
                  color 0.4s ease;
      will-change: transform, text-shadow;
    }

    @keyframes softGlow {
      0% { text-shadow: 0 0 10px rgba(74, 144, 226, 0.3), 0 0 20px rgba(74, 144, 226, 0.1); }
      100% { text-shadow: 0 0 20px rgba(74, 144, 226, 0.6), 0 0 40px rgba(74, 144, 226, 0.3); }
    }

    @media (max-width: 768px) {
      .welcome { font-size: 8vw; }
    }

    .orbit-container {
      position: absolute;
      top: 120px;
      right: 160px;
      transform: none;
      width: 0;
      height: 0;
      z-index: 10;
      pointer-events: none;
    }

    .orbit-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      height: 400px;
      margin-top: -200px;
      margin-left: -200px;
      animation: orbitSpin 45s linear infinite;
    }

    @keyframes orbitSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .orbit-ring .social-icon {
      position: absolute;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: auto;
      cursor: none;
      transition: background 0.3s, transform 0.3s;
    }

    .orbit-ring .social-icon:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.2) !important;
    }

    .orbit-ring .social-icon svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .social-icon {
      position: absolute;
      top: 50%;
      left: 50%;
    }

    .social-icon:nth-child(1) { transform: rotate(0deg) translateX(200px) rotate(0deg); }
    .social-icon:nth-child(2) { transform: rotate(60deg) translateX(200px) rotate(-60deg); }
    .social-icon:nth-child(3) { transform: rotate(120deg) translateX(200px) rotate(-120deg); }
    .social-icon:nth-child(4) { transform: rotate(180deg) translateX(200px) rotate(-180deg); }
    .social-icon:nth-child(5) { transform: rotate(240deg) translateX(200px) rotate(-240deg); }
    .social-icon:nth-child(6) { transform: rotate(300deg) translateX(200px) rotate(-300deg); }

    .social-icon:nth-child(1) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(2) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(3) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(4) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(5) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(6) { margin-top: -19px; margin-left: -19px; }

    .scroll-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }

    .scroll-hint svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: rgba(255,255,255,0.5);
      stroke-width: 2;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @media (max-width: 768px) {
      .cursor-dot { display: none; }
      body { cursor: auto; }
      .orbit-ring .social-icon { cursor: pointer; }
      .orbit-ring { width: 160px; height: 160px; margin-top: -80px; margin-left: -80px; }
      .social-icon:nth-child(1) { transform: rotate(0deg) translateX(80px) rotate(0deg); }
      .social-icon:nth-child(2) { transform: rotate(60deg) translateX(80px) rotate(-60deg); }
      .social-icon:nth-child(3) { transform: rotate(120deg) translateX(80px) rotate(-120deg); }
      .social-icon:nth-child(4) { transform: rotate(180deg) translateX(80px) rotate(-180deg); }
      .social-icon:nth-child(5) { transform: rotate(240deg) translateX(80px) rotate(-240deg); }
      .social-icon:nth-child(6) { transform: rotate(300deg) translateX(80px) rotate(-300deg); }
    }

    /* ─── F1 CAR SECTION ─── */
    .f1-section {
      position: relative;
      width: 100%;
      height: 200vh;
      background: linear-gradient(180deg, #000 0%, #0a0a1a 30%, #050520 70%, #000 100%);
      overflow: hidden;
    }

    .f1-sticky {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      overflow: hidden;
    }

    /* Lightning Canvas */
    #lightningCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.1s;
    }

    /* 3D F1 Car Container */
    .f1-car-wrapper {
      position: relative;
      width: 500px;
      height: 200px;
      transform-style: preserve-3d;
      transform: rotateX(15deg) rotateY(-180deg) translateX(800px) scale(0.3);
      opacity: 0;
      transition: none;
      will-change: transform, opacity;
    }

    .f1-car {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    /* Car Body - Main Chassis */
    .car-body {
      position: absolute;
      width: 360px;
      height: 50px;
      left: 70px;
      top: 75px;
      background: linear-gradient(180deg, #e10600 0%, #b80500 50%, #8b0300 100%);
      border-radius: 20px 60px 8px 8px;
      box-shadow:
        0 0 30px rgba(225, 6, 0, 0.6),
        0 0 60px rgba(225, 6, 0, 0.3),
        inset 0 -5px 15px rgba(0,0,0,0.4);
      transform: translateZ(20px);
    }

    .car-body::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 30px;
      right: 80px;
      height: 15px;
      background: linear-gradient(180deg, #ff2020, #e10600);
      border-radius: 8px 40px 0 0;
      box-shadow: 0 -2px 15px rgba(225, 6, 0, 0.5);
    }

    .car-body::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(180deg, #660000, #330000);
      border-radius: 0 0 8px 8px;
    }

    /* Cockpit */
    .car-cockpit {
      position: absolute;
      width: 100px;
      height: 35px;
      left: 180px;
      top: 42px;
      background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
      border-radius: 30px 30px 5px 5px;
      transform: translateZ(35px);
      box-shadow:
        inset 0 2px 10px rgba(0,212,255,0.3),
        0 0 20px rgba(0,0,0,0.5);
    }

    .car-cockpit::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 10px;
      right: 10px;
      height: 15px;
      background: linear-gradient(180deg, rgba(0,212,255,0.2), transparent);
      border-radius: 20px 20px 0 0;
    }

    /* Nose Cone */
    .car-nose {
      position: absolute;
      width: 100px;
      height: 30px;
      left: -15px;
      top: 85px;
      background: linear-gradient(180deg, #e10600, #990000);
      clip-path: polygon(0% 50%, 40% 0%, 100% 0%, 100% 100%, 40% 100%);
      transform: translateZ(20px);
      box-shadow: 0 0 20px rgba(225, 6, 0, 0.4);
    }

    .car-nose::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 3px;
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 0 10px #fff;
    }

    /* Rear Wing */
    .car-wing-rear {
      position: absolute;
      width: 80px;
      height: 8px;
      right: -5px;
      top: 55px;
      background: linear-gradient(180deg, #1a1a1a, #000);
      border-radius: 2px;
      transform: translateZ(45px);
      box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }

    .car-wing-rear::before {
      content: '';
      position: absolute;
      top: -20px;
      left: 10px;
      right: 10px;
      height: 6px;
      background: linear-gradient(180deg, #e10600, #990000);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(225, 6, 0, 0.5);
    }

    .car-wing-rear::after {
      content: '';
      position: absolute;
      top: -18px;
      left: 5px;
      width: 3px;
      height: 18px;
      background: #333;
    }

    /* Front Wing */
    .car-wing-front {
      position: absolute;
      width: 60px;
      height: 6px;
      left: -10px;
      top: 70px;
      background: linear-gradient(180deg, #1a1a1a, #000);
      border-radius: 2px;
      transform: translateZ(25px);
    }

    .car-wing-front::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 5px;
      right: 5px;
      height: 4px;
      background: linear-gradient(180deg, #e10600, #990000);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(225, 6, 0, 0.4);
    }

    /* Wheels */
    .car-wheel {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #333, #111 60%, #000);
      border: 3px solid #222;
      transform: translateZ(5px);
      box-shadow:
        0 0 15px rgba(0,0,0,0.8),
        inset 0 0 10px rgba(0,212,255,0.1);
    }

    .car-wheel::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, #444, #222);
      border: 2px solid #555;
    }

    .car-wheel::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.05);
    }

    .wheel-fl { left: 30px; top: 80px; }
    .wheel-fr { left: 30px; top: 120px; }
    .wheel-rl { right: 50px; top: 80px; }
    .wheel-rr { right: 50px; top: 120px; }

    /* Tire marks */
    .car-wheel {
      animation: wheelSpin 0.5s linear infinite;
    }

    @keyframes wheelSpin {
      to { transform: translateZ(5px) rotate(360deg); }
    }

    /* Halo */
    .car-halo {
      position: absolute;
      width: 50px;
      height: 25px;
      left: 195px;
      top: 30px;
      border: 3px solid #444;
      border-bottom: none;
      border-radius: 25px 25px 0 0;
      transform: translateZ(40px);
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* Sidepod */
    .car-sidepod-l,
    .car-sidepod-r {
      position: absolute;
      width: 80px;
      height: 25px;
      background: linear-gradient(180deg, #cc0000, #880000);
      border-radius: 5px 15px 5px 5px;
      transform: translateZ(15px);
    }

    .car-sidepod-l {
      left: 120px;
      top: 100px;
    }

    .car-sidepod-r {
      left: 120px;
      top: 75px;
    }

    /* Exhaust glow */
    .car-exhaust {
      position: absolute;
      right: -20px;
      top: 95px;
      width: 30px;
      height: 10px;
      background: radial-gradient(ellipse, rgba(255,150,0,0.8), rgba(255,100,0,0.3), transparent);
      border-radius: 50%;
      animation: exhaustPulse 0.15s ease-in-out infinite alternate;
      transform: translateZ(20px);
    }

    @keyframes exhaustPulse {
      from { opacity: 0.6; transform: translateZ(20px) scaleX(0.8); }
      to { opacity: 1; transform: translateZ(20px) scaleX(1.2); }
    }

    /* Ground Shadow */
    .car-shadow {
      position: absolute;
      width: 420px;
      height: 30px;
      left: 40px;
      bottom: -10px;
      background: radial-gradient(ellipse, rgba(225,6,0,0.3), transparent 70%);
      filter: blur(10px);
      transform: rotateX(90deg) translateZ(-20px);
    }

    /* Speed Lines */
    .speed-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    .speed-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(225,6,0,0.6), transparent);
      border-radius: 1px;
    }

    /* F1 Text */
    .f1-title {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: clamp(60px, 12vw, 160px);
      font-weight: 900;
      text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 2px rgba(225, 6, 0, 0.4);
      letter-spacing: 20px;
      opacity: 0;
      white-space: nowrap;
      z-index: 6;
    }

    .f1-title span {
      color: #e10600;
      -webkit-text-stroke: 0;
      text-shadow: 0 0 40px rgba(225, 6, 0, 0.6), 0 0 80px rgba(225, 6, 0, 0.3);
    }

    /* Speed text */
    .speed-text {
      position: absolute;
      top: 20%;
      right: 10%;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: rgba(225, 6, 0, 0.6);
      letter-spacing: 4px;
      opacity: 0;
      z-index: 6;
    }

    .speed-number {
      font-size: 48px;
      font-weight: bold;
      color: #e10600;
      text-shadow: 0 0 20px rgba(225, 6, 0, 0.5);
    }

    /* After F1 section */
    .after-f1 {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 80px 20px;
    }

    .after-f1 h2 {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: clamp(32px, 5vw, 64px);
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
    }

    .after-f1 p {
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      text-align: center;
      max-width: 600px;
    }
  </style>
</head>

  <!-- After F1 -->
  <section class="after-f1">
    <h2>Speed Meets Design</h2>
    <p>Premium performance in every pixel. That's the xoleric way.</p>
  </section>

  <script>
    const reveal = document.getElementById('reveal');
    const dot = document.getElementById('dot');
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    let mx = window.innerWidth / 2;
    let my = window.innerHeight / 2;
    let cx = mx, cy = my;
    let targetR = 0;
    let currentR = 0;
    let active = false;
    let lastTouchTime = 0;

    const CIRCLE_SIZE = 200;
    const CIRCLE_SIZE_MOBILE = 140;

    if (isMobile) {
      document.addEventListener('touchstart', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
        targetR = CIRCLE_SIZE_MOBILE;
      }, { passive: true });

      document.addEventListener('touchmove', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
      }, { passive: true });

      document.addEventListener('touchend', () => {
        setTimeout(() => {
          if (Date.now() - lastTouchTime > 600) {
            targetR = 0;
            active = false;
          }
        }, 600);
      });
    } else {
      targetR = CIRCLE_SIZE;
      active = true;

      document.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
      });
    }

    function loop() {
      cx += (mx - cx) * 0.25;
      cy += (my - cy) * 0.25;
      currentR += (targetR - currentR) * 0.1;

      if (currentR > 0.5) {
        reveal.style.maskImage =
          `radial-gradient(circle ${currentR}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
        reveal.style.webkitMaskImage =
          `radial-gradient(circle ${currentR}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
      } else {
        reveal.style.maskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
        reveal.style.webkitMaskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
      }

      requestAnimationFrame(loop);
    }

    loop();

    // Welcome text animation
    const welcomeText = 'welcome to xoleric portfolio';
    const welcomeEl = document.getElementById('welcome');
    const letterEls = [];
    welcomeText.split('').forEach((char, index) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.classList.add('letter');
      span.style.animationDelay = `${index * 0.1}s`;
      welcomeEl.appendChild(span);
      letterEls.push(span);
      setTimeout(() => {
        span.classList.add('visible');
      }, index * 120);
    });

    // Magnetic letter effect
    const LETTER_RADIUS = 150;
    const LETTER_FORCE = 35;
    const letterStates = letterEls.map(() => ({
      offsetX: 0, offsetY: 0,
      velocityX: 0, velocityY: 0,
      glowIntensity: 0,
      scaleBoost: 0,
      rotX: 0, rotY: 0
    }));

    function updateLetters() {
      letterEls.forEach((span, i) => {
        if (!span.classList.contains('visible')) return;
        const rect = span.getBoundingClientRect();
        const lx = rect.left + rect.width / 2;
        const ly = rect.top + rect.height / 2;

        let dx = mx - lx;
        let dy = my - ly;
        const dist = Math.sqrt(dx * dx + dy * dy);

        const state = letterStates[i];
        let forceX = 0, forceY = 0;
        let glow = 0, scale = 0;
        let rX = 0, rY = 0;

        if (dist < LETTER_RADIUS && dist > 0) {
          const strength = 1 - dist / LETTER_RADIUS;
          const power = strength * strength;
          forceX = -(dx / dist) * LETTER_FORCE * power;
          forceY = -(dy / dist) * LETTER_FORCE * power;
          glow = power;
          scale = power * 0.15;
          rX = -(dy / dist) * 20 * power;
          rY = (dx / dist) * 20 * power;
        }

        state.velocityX += forceX;
        state.velocityY += forceY;
        state.velocityX *= 0.88;
        state.velocityY *= 0.88;
        state.offsetX += state.velocityX;
        state.offsetY += state.velocityY;

        const returnForce = 0.12;
        state.offsetX += -state.offsetX * returnForce;
        state.offsetY += -state.offsetY * returnForce;

        state.glowIntensity += (glow - state.glowIntensity) * 0.15;
        state.scaleBoost += (scale - state.scaleBoost) * 0.15;
        state.rotX += (rX - state.rotX) * 0.1;
        state.rotY += (rY - state.rotY) * 0.1;

        const s = 1 + state.scaleBoost;
        const g = state.glowIntensity;
        const hue = 190 + g * 60;

        span.style.transform =
          `translate(${state.offsetX}px, ${state.offsetY}px) scale(${s}) perspective(500px) rotateX(${state.rotX}deg) rotateY(${state.rotY}deg)`;
        span.style.textShadow =
          `0 0 ${10 + g * 30}px hsla(${hue}, 100%, 70%, ${0.3 + g * 0.7}),
           0 0 ${20 + g * 50}px hsla(${hue}, 100%, 60%, ${0.1 + g * 0.5}),
           0 0 ${5 + g * 15}px rgba(255,255,255,${g * 0.4})`;
        span.style.color = g > 0.3
          ? `hsl(${hue}, ${60 + g * 40}%, ${80 + g * 15}%)`
          : 'rgba(230, 230, 230, 0.9)';
      });
    }

    // Neurons
    const pc = document.getElementById('particles');
    const pctx = pc.getContext('2d');
    let PW, PH;
    function pResize() {
      PW = pc.width = window.innerWidth;
      PH = pc.height = window.innerHeight;
    }
    pResize();
    window.addEventListener('resize', pResize);

    const NEURON_COUNT = 40;
    const CONNECT_DIST = 200;
    const CURSOR_REPEL = 250;
    const REVEAL_REPEL = 220;
    const neurons = [];

    function createNeuron() {
      let x, y;
      do {
        x = Math.random() * PW;
        y = Math.random() * PH;
      } while (Math.sqrt((x - mx) ** 2 + (y - my) ** 2) < CURSOR_REPEL);
      return {
        x, y,
        vx: (Math.random() - 0.5) * 0.05,
        vy: (Math.random() - 0.5) * 0.05,
        size: Math.random() * 4 + 3,
        opacity: Math.random() * 0.6 + 0.3,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.008 + 0.002,
        drift: Math.random() * Math.PI * 2,
        driftSpeed: Math.random() * 0.001 + 0.0003,
        driftRadius: Math.random() * 0.03 + 0.01
      };
    }

    for (let i = 0; i < NEURON_COUNT; i++) neurons.push(createNeuron());

    function drawNeurons() {
      pctx.clearRect(0, 0, PW, PH);

      for (let i = 0; i < neurons.length; i++) {
        const n = neurons[i];

        const dx = mx - n.x;
        const dy = my - n.y;
        const distToCursor = Math.sqrt(dx * dx + dy * dy);
        if (distToCursor < CURSOR_REPEL && distToCursor > 0) {
          const force = (1 - distToCursor / CURSOR_REPEL) * 0.8;
          n.vx -= (dx / distToCursor) * force;
          n.vy -= (dy / distToCursor) * force;
        }

        const rcx = cx;
        const rcy = cy;
        const dxr = rcx - n.x;
        const dyr = rcy - n.y;
        const distToReveal = Math.sqrt(dxr * dxr + dyr * dyr);
        if (distToReveal < REVEAL_REPEL && distToReveal > 0) {
          const force = (1 - distToReveal / REVEAL_REPEL) * 0.5;
          n.vx -= (dxr / distToReveal) * force;
          n.vy -= (dyr / distToReveal) * force;
        }

        n.vx *= 0.98;
        n.vy *= 0.98;

        n.drift += n.driftSpeed;
        n.vx += Math.sin(n.drift) * n.driftRadius;
        n.vy += Math.cos(n.drift * 0.7) * n.driftRadius;

        n.x += n.vx;
        n.y += n.vy;
        n.pulse += n.pulseSpeed;

        if (n.x < -30) n.x = PW + 30;
        if (n.x > PW + 30) n.x = -30;
        if (n.y < -30) n.y = PH + 30;
        if (n.y > PH + 30) n.y = -30;
      }

      for (let i = 0; i < neurons.length; i++) {
        for (let j = i + 1; j < neurons.length; j++) {
          const a = neurons[i];
          const b = neurons[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CONNECT_DIST) {
            const t = (1 - dist / CONNECT_DIST);
            const lineAlpha = t * 0.5;
            pctx.beginPath();
            pctx.moveTo(a.x, a.y);
            pctx.lineTo(b.x, b.y);
            pctx.strokeStyle = `rgba(210, 170, 0, ${lineAlpha})`;
            pctx.lineWidth = t * 1.5;
            pctx.stroke();
          }
        }
      }

      for (let i = 0; i < neurons.length; i++) {
        const n = neurons[i];
        const pulseFactor = 0.6 + Math.sin(n.pulse) * 0.4;
        const alpha = n.opacity * pulseFactor;

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size * 2, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.1})`;
        pctx.fill();

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
        pctx.fill();

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size * 0.5, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(20, 18, 0, ${alpha * 0.8})`;
        pctx.fill();
      }

      requestAnimationFrame(drawNeurons);
      updateLetters();
    }

    drawNeurons();

    // ═══════════════════════════════════════════
    // F1 CAR SCROLL ANIMATION
    // ═══════════════════════════════════════════

    const f1Section = document.getElementById('f1Section');
    const f1Car = document.getElementById('f1Car');
    const f1Title = document.getElementById('f1Title');
    const speedText = document.getElementById('speedText');
    const speedNum = document.getElementById('speedNum');
    const speedLines = document.getElementById('speedLines');
    const lightningCanvas = document.getElementById('lightningCanvas');
    const lctx = lightningCanvas.getContext('2d');

    function resizeLightning() {
      lightningCanvas.width = window.innerWidth;
      lightningCanvas.height = window.innerHeight;
    }
    resizeLightning();
    window.addEventListener('resize', resizeLightning);

    // Create speed lines
    for (let i = 0; i < 20; i++) {
      const line = document.createElement('div');
      line.className = 'speed-line';
      line.style.top = Math.random() * 100 + '%';
      line.style.width = Math.random() * 200 + 100 + 'px';
      line.style.left = Math.random() * 100 + '%';
      speedLines.appendChild(line);
    }

    // Lightning system
    let lightningBolts = [];
    let lightningActive = false;

    function createLightningBolt(x, y, length, angle, depth) {
      if (depth <= 0 || length < 5) return;

      const endX = x + Math.cos(angle) * length;
      const endY = y + Math.sin(angle) * length;
      const segments = Math.floor(length / 10);

      let points = [{ x, y }];
      for (let i = 1; i < segments; i++) {
        const t = i / segments;
        const px = x + (endX - x) * t + (Math.random() - 0.5) * 30;
        const py = y + (endY - y) * t + (Math.random() - 0.5) * 30;
        points.push({ x: px, y: py });
      }
      points.push({ x: endX, y: endY });

      lightningBolts.push({ points, alpha: 1, decay: 0.02 + Math.random() * 0.03 });

      // Branch
      if (Math.random() < 0.4 && depth > 1) {
        const branchPoint = points[Math.floor(Math.random() * points.length)];
        const branchAngle = angle + (Math.random() - 0.5) * 1.5;
        createLightningBolt(branchPoint.x, branchPoint.y, length * 0.5, branchAngle, depth - 1);
      }
    }

    function drawLightning() {
      lctx.clearRect(0, 0, lightningCanvas.width, lightningCanvas.height);

      lightningBolts = lightningBolts.filter(bolt => {
        bolt.alpha -= bolt.decay;
        if (bolt.alpha <= 0) return false;

        // Glow
        lctx.beginPath();
        lctx.moveTo(bolt.points[0].x, bolt.points[0].y);
        for (let i = 1; i < bolt.points.length; i++) {
          lctx.lineTo(bolt.points[i].x, bolt.points[i].y);
        }
        lctx.strokeStyle = `rgba(180, 200, 255, ${bolt.alpha * 0.3})`;
        lctx.lineWidth = 8;
        lctx.stroke();

        // Core
        lctx.beginPath();
        lctx.moveTo(bolt.points[0].x, bolt.points[0].y);
        for (let i = 1; i < bolt.points.length; i++) {
          lctx.lineTo(bolt.points[i].x, bolt.points[i].y);
        }
        lctx.strokeStyle = `rgba(255, 255, 255, ${bolt.alpha})`;
        lctx.lineWidth = 2;
        lctx.stroke();

        return true;
      });

      requestAnimationFrame(drawLightning);
    }

    drawLightning();

    function triggerLightning() {
      if (!lightningActive) return;

      const w = lightningCanvas.width;
      const h = lightningCanvas.height;

      // Multiple bolts
      const boltCount = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < boltCount; i++) {
        const x = Math.random() * w;
        const y = 0;
        const length = Math.random() * 300 + 200;
        const angle = Math.PI / 2 + (Math.random() - 0.5) * 0.8;
        createLightningBolt(x, y, length, angle, 3);
      }

      // Screen flash
      lightningCanvas.style.opacity = '0.15';
      setTimeout(() => { lightningCanvas.style.opacity = '0'; }, 50);
    }

    // Periodic lightning
    let lightningInterval;
    function startLightningStorm() {
      lightningActive = true;
      triggerLightning();
      lightningInterval = setInterval(() => {
        if (Math.random() < 0.6) triggerLightning();
      }, 200);
    }

    function stopLightningStorm() {
      lightningActive = false;
      clearInterval(lightningInterval);
    }

    // Scroll handler for F1 section
    let f1Animating = false;

    function handleF1Scroll() {
      const rect = f1Section.getBoundingClientRect();
      const sectionHeight = f1Section.offsetHeight;
      const viewportHeight = window.innerHeight;

      // Progress: 0 (top of section) to 1 (bottom of section)
      const scrolled = -rect.top;
      const totalScrollable = sectionHeight - viewportHeight;
      const progress = Math.max(0, Math.min(1, scrolled / totalScrollable));

      if (progress > 0 && progress < 1) {
        f1Animating = true;

        // Phase 1: Car enters (0 - 0.3) — from right, rotating
        // Phase 2: Car centers (0.3 - 0.5) — stops rotation, scales up
        // Phase 3: Car shows speed (0.5 - 0.8) — speed lines + counter
        // Phase 4: Lightning storm (0.8 - 1.0) — dramatic finish

        let carX, carY, carRotY, carRotX, carScale, carOpacity;

        if (progress < 0.3) {
          // Entry phase
          const t = progress / 0.3;
          const ease = t * t * (3 - 2 * t); // smoothstep

          carX = lerp(800, 0, ease);
          carRotY = lerp(-180, -30, ease);
          carRotX = lerp(15, 10, ease);
          carScale = lerp(0.3, 0.8, ease);
          carOpacity = ease;

          f1Car.style.transform = `rotateX(${carRotX}deg) rotateY(${carRotY}deg) translateX(${carX}px) scale(${carScale})`;
          f1Car.style.opacity = carOpacity;

          f1Title.style.opacity = '0';
          speedText.style.opacity = '0';
          speedLines.style.opacity = '0';
          stopLightningStorm();

        } else if (progress < 0.5) {
          // Center phase
          const t = (progress - 0.3) / 0.2;
          const ease = t * t * (3 - 2 * t);

          carRotY = lerp(-30, 0, ease);
          carRotX = lerp(10, 5, ease);
          carScale = lerp(0.8, 1, ease);

          f1Car.style.transform = `rotateX(${carRotX}deg) rotateY(${carRotY}deg) translateX(0px) scale(${carScale})`;
          f1Car.style.opacity = '1';

          f1Title.style.opacity = ease * 0.8;
          f1Title.style.transform = `translateX(-50%) translateY(${lerp(50, 0, ease)}px)`;

          speedText.style.opacity = '0';
          speedLines.style.opacity = '0';
          stopLightningStorm();

        } else if (progress < 0.8) {
          // Speed phase
          const t = (progress - 0.5) / 0.3;

          f1Car.style.transform = `rotateX(5deg) rotateY(0deg) translateX(0px) scale(1)`;
          f1Car.style.opacity = '1';

          f1Title.style.opacity = '0.8';
          f1Title.style.transform = 'translateX(-50%) translateY(0)';

          speedText.style.opacity = t;
          const speed = Math.round(t * 370);
          speedNum.textContent = speed;

          speedLines.style.opacity = t;
          const lines = speedLines.querySelectorAll('.speed-line');
          lines.forEach((line, i) => {
            const offset = (performance.now() * (0.5 + i * 0.1)) % 200;
            line.style.transform = `translateX(${-offset}px)`;
          });

          // Slight vibration at high speed
          if (t > 0.5) {
            const shake = (1 - t) * 2;
            f1Car.style.transform = `rotateX(${5 + (Math.random() - 0.5) * shake}deg) rotateY(${(Math.random() - 0.5) * shake}deg) translateX(0px) scale(1)`;
          }

          stopLightningStorm();

        } else {
          // Lightning phase
          const t = (progress - 0.8) / 0.2;

          f1Car.style.transform = `rotateX(5deg) rotateY(0deg) translateX(0px) scale(1)`;
          f1Car.style.opacity = 1 - t * 0.3;

          f1Title.style.opacity = 0.8 - t * 0.5;
          speedText.style.opacity = 1;
          speedNum.textContent = 370;
          speedLines.style.opacity = 1;

          if (!lightningActive) startLightningStorm();
        }

      } else if (progress <= 0) {
        // Before section
        f1Car.style.opacity = '0';
        f1Title.style.opacity = '0';
        speedText.style.opacity = '0';
        speedLines.style.opacity = '0';
        stopLightningStorm();

      } else {
        // After section
        stopLightningStorm();
      }
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    window.addEventListener('scroll', handleF1Scroll, { passive: true });
    handleF1Scroll();
  </script>
</body>
</html>
